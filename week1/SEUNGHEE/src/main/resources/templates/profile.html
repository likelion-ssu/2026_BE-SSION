<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>1주차 과제 자기소개</title>
</head>
<body>

<h1>자기소개</h1>

<hr>

<!-- TODO: 추가하고 싶은 내용이 있다면 작성해주세요 -->
<h2>기본 정보</h2>
<p>이름: <span th:text="${name}">default</span></p>
<p>전공: <span th:text="${major}">default</span></p>
<p>이메일: <span th:text="${email}">default</span></p>
<p>관심 분야: <span th:text="${interest}">default</span></p>

<hr>

<h2>소개</h2>
<p>
   느리지만 매일 성장하려는 거북이형 개발자 김승희입니다.!
</p>

<hr>

<h2>기술 스택</h2>
<ul>
    <li th:each="skill : ${skills}" th:text="${skill}">default</li>
</ul>

<hr>

<h2>목표</h2>
<p>
   수한이형 따라잡기!!
</p>

</body>
</html>
